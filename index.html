<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora binarios</title>
</head>
<body>
    <header></header>
    <main>
        <section class="content">
            <h2>Calculadora binarios</h2>
            <div class="input">
                <select name="operacao" id="operacao">
                    <option value="decimal-binario">Decimal para binario</option>
                    <option value="binario-decimal">Binario para decimal</option>
                </select>
                <label for="input">Insira seu numero</label>
                <input type="text" id="input">
            </div>
            <button onclick="calcular()">Clique aqui para calcular</button>
            <div id="res"></div>
        </section>
    </main>
    <footer></footer>

    <script src="app.js"></script>
</body>
</html>
